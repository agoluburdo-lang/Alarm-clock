name: Build Android APK (Standalone)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Позволяет запускать сборку вручную в интерфейсе GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем репозиторий
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Устанавливаем Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3. Устанавливаем зависимости и собираем веб-версию (React + Vite)
      - name: Install Dependencies & Build Web
        run: |
          rm -f package-lock.json
          npm install --legacy-peer-deps
          npm run build

      # 4. Инициализируем Capacitor и добавляем платформу Android
      - name: Add Android Platform via Capacitor
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Android directory already exists, skipping 'cap add android'."
          fi
          npx cap sync

      # 5. Настраиваем WebView в MainActivity для автоматического воспроизведения звука (без кликов!)
      - name: Disable Media Playback User Gesture Requirement
        run: |
          mkdir -p android/app/src/main/java/com/minimalist/alarmclock
          # Удаляем стандартный MainActivity.kt (Kotlin) для предотвращения дублирования классов с MainActivity.java
          rm -f android/app/src/main/java/com/minimalist/alarmclock/MainActivity.kt
          cat << 'EOF' > android/app/src/main/java/com/minimalist/alarmclock/MainActivity.java
          package com.minimalist.alarmclock;

          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
              }

              @Override
              public void onStart() {
                  super.onStart();
                  // Отключаем обязательное требование кликов по экрану для воспроизведения звуков будильника
                  WebView webView = this.getBridge().getWebView();
                  if (webView != null) {
                      WebSettings settings = webView.getSettings();
                      settings.setMediaPlaybackRequiresUserGesture(false);
                  }
              }
          }
          EOF

      # 6. Устанавливаем Java 21 для сборки Android Gradle проекта
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      # 7. Предоставляем права на выполнение Gradle Wrapper
      - name: Grant Execute Permission for Gradle
        run: |
          sed -i 's/\r$//' android/gradlew
          chmod +x android/gradlew

      # 8. Компилируем готовый отладочный APK (Debug APK)
      # Отладочный APK не требует цифровой подписи (keystore) и сразу готов к установке на телефон
      - name: Build Android Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      # 9. Сохраняем и публикуем готовый APK файл в артефактах GitHub
      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Minimalist-AlarmClock-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

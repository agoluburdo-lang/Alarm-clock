name: Build Android APK (Standalone)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Позволяет запускать сборку вручную в интерфейсе GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем репозиторий
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Устанавливаем Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3. Устанавливаем зависимости и собираем веб-версию (React + Vite)
      - name: Install Dependencies & Build Web
        run: |
          rm -f package-lock.json
          npm install --legacy-peer-deps
          npm run build

      # 4. Инициализируем Capacitor и добавляем платформу Android
      - name: Add Android Platform via Capacitor
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Android directory already exists, skipping 'cap add android'."
          fi
          npx cap sync

      # 6. Устанавливаем Java 21 для сборки Android Gradle проекта
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Delete Corrupted Gradle Wrapper
        run: rm -f android/gradle/wrapper/gradle-wrapper.jar

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.12.1'
          cache-disabled: true
          validate-wrappers: false

      # 7. Генерируем свежий Gradle Wrapper (используем предустановленный в Ubuntu Gradle)
      - name: Generate Fresh Gradle Wrapper
        run: |
          cd android
          gradle wrapper --gradle-version 8.12.1
          chmod +x gradlew

      # 8. Компилируем готовый отладочный APK (Debug APK)
      - name: Build Android Debug APK
        run: |
          cd android
          if ! ./gradlew clean assembleDebug --no-daemon --console=plain --stacktrace > build_output.log 2>&1; then
            echo "## Gradle Build Failed ❌" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Click to view build log</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```log' >> $GITHUB_STEP_SUMMARY
            cat build_output.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      # 9. Сохраняем и публикуем готовый APK файл в артефактах GitHub
      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Minimalist-AlarmClock-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
